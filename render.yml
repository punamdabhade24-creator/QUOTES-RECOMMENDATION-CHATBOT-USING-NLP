services:
  - type: web
    name: quotebot
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python -m spacy download en_core_web_md
      rasa train
    startCommand: |
      # Start both services on Render
      rasa run actions --actions actions --port 5055 &
      sleep 5
      rasa run --enable-api --cors "*" --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
      - key: RASA_TELEMETRY_ENABLED
        value: "false"
